<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>茶饮店管理系统 | 注册账号</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Noto Sans SC', sans-serif;
            overflow: hidden;
            background-color: #fdf6e3;
        }

        /* Glassmorphism Card - 暖色调 */
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 60px rgba(212, 163, 115, 0.25);
            transform-style: preserve-3d;
            transition: transform 0.1s ease;
        }

        /* 茶饮主题渐变背景 */
        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.5;
            animation: float 10s infinite ease-in-out;
        }
        .blob-1 { top: -10%; left: -10%; width: 500px; height: 500px; background: #d4a373; animation-delay: 0s; }
        .blob-2 { bottom: -10%; right: -10%; width: 400px; height: 400px; background: #ccd5ae; animation-delay: 2s; }
        .blob-3 { top: 40%; left: 40%; width: 300px; height: 300px; background: #e9edc9; animation-delay: 4s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        /* Input Autofill Fix - 暖色调 */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px #fefae0 inset !important;
            -webkit-text-fill-color: #5c4033 !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        /* Loader */
        .loader {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 20px;
            height: 20px;
            -webkit-animation: spin 1s linear infinite;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Shake Animation for Error */
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        /* Floating Label Logic - 深棕色 */
        .floating-input:placeholder-shown + .floating-label {
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
            color: #8b7355;
        }
        .floating-input:focus + .floating-label,
        .floating-input:not(:placeholder-shown) + .floating-label {
            top: -10px;
            font-size: 0.75rem;
            color: #d4a373;
            background-color: #fdf6e3;
            padding: 0 4px;
        }

        /* Toast Notification - 暖色调 */
        .toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 50;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }

        /* Strength Meter - 暖色调 */
        .strength-meter {
            height: 4px;
            border-radius: 2px;
            transition: all 0.3s;
            margin-top: 8px;
        }

        /* CAPTCHA Slider Styles - 暖色调 */
        .captcha-container {
            position: relative;
            width: 100%;
            height: 40px;
            background: rgba(254, 250, 224, 0.8);
            border-radius: 20px;
            border: 1px solid rgba(212, 163, 115, 0.3);
            overflow: hidden;
        }

        .captcha-slider {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 40px;
            background: linear-gradient(135deg, #d4a373, #bc6c25);
            border-radius: 20px;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            box-shadow: 0 2px 10px rgba(212, 163, 115, 0.4);
            transition: transform 0.1s;
            z-index: 10;
        }

        .captcha-slider:active {
            cursor: grabbing;
            transform: scale(1.05);
        }

        .captcha-slider.success {
            width: 100% !important;
            transition: width 0.3s ease;
        }

        .captcha-bg {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: linear-gradient(90deg, rgba(212, 163, 115, 0.3), rgba(212, 163, 115, 0.1));
            border-radius: 20px;
            width: 0;
            transition: width 0.1s;
        }

        .captcha-text {
            position: absolute;
            width: 100%;
            text-align: center;
            line-height: 40px;
            color: #8b7355;
            font-size: 14px;
            user-select: none;
            pointer-events: none;
        }

        .captcha-text.success {
            color: #bc6c25;
            font-weight: 600;
        }

        .captcha-slider.success i {
            animation: checkPop 0.3s ease;
        }

        @keyframes checkPop {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* 茶饮店特色装饰 */
        .tea-leaf {
            position: absolute;
            font-size: 24px;
            color: #d4a373;
            opacity: 0.3;
            animation: fall 15s linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body class="h-screen w-full flex items-center justify-center relative selection:bg-amber-500 selection:text-white">

<!-- Main Container -->
<div id="tiltCard" class="glass-card relative z-10 w-full max-w-md p-8 rounded-2xl mx-4 max-h-[90vh]">

    <!-- Header -->
    <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-tr from-amber-400 to-orange-500 mb-4 shadow-lg shadow-orange-500/30">

    <!-- Form -->
    <form id="registerForm" class="space-y-5" novalidate>

        <!-- Username Input -->
<!--        <div class="relative group">-->
<!--            <input type="text" id="username" class="floating-input block w-full px-4 py-3 text-amber-900 bg-amber-50/80 border border-amber-200 rounded-lg focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-colors appearance-none placeholder-transparent" placeholder="Username" maxlength="20">-->

        <!-- Phone Input -->
        <div class="relative group">
            <input type="tel" id="phone" class="floating-input block w-full px-4 py-3 text-amber-900 bg-amber-50/80 border border-amber-200 rounded-lg focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-colors appearance-none placeholder-transparent" placeholder="13800138000" maxlength="11">
            <label for="phone" class="floating-label absolute left-3 text-amber-700/60 transition-all duration-200 pointer-events-none">手机号码</label>
            <div class="absolute right-3 top-3.5 text-amber-600/60">

            <label for="password" class="floating-label absolute left-3 text-amber-700/60 transition-all duration-200 pointer-events-none">设置密码</label>

        <!-- Submit Button -->
        <button type="submit" id="submitBtn" class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-600 hover:to-orange-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-amber-500 focus:ring-offset-amber-50 transition-all transform hover:scale-[1.02] active:scale-[0.98]">

    <!-- Footer -->
    <p class="mt-6 text-center text-sm text-amber-700/60">

<!-- Toast Notification -->
<div id="toast" class="toast flex items-center justify-center gap-3">
    <i id="toastIcon" class="fas fa-check-circle text-green-400 text-xl"></i>
    <span id="toastMessage">Operation Successful</span>
</div>

<script>
    // ==========================================
    // 后端服务器连接配置
    // ==========================================
    const SERVER_CONFIG = {
        BASE_URL: 'https://192.168.142.134',  // 服务器基础地址
        REGISTER_ENDPOINT: '/api/register', // 注册接口路径
        TIMEOUT: 5000,                      // 请求超时时间(毫秒)
        RETRY_ATTEMPTS: 3                   // 重试次数
    };

    document.addEventListener('DOMContentLoaded', () => {
        const card = document.getElementById('tiltCard');
        const form = document.getElementById('registerForm');
        // const usernameInput = document.getElementById('username');
        const phoneInput = document.getElementById('phone');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const togglePasswordBtn = document.getElementById('togglePassword');
        const toggleConfirmPasswordBtn = document.getElementById('toggleConfirmPassword');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');
        const toastIcon = document.getElementById('toastIcon');
        const strengthMeter = document.getElementById('strengthMeter');
        const strengthText = document.getElementById('strengthText');
        const agreementCheckbox = document.getElementById('agreement');

        // CAPTCHA elements
        const captchaContainer = document.getElementById('captchaContainer');
        const captchaSlider = document.getElementById('captchaSlider');
        const captchaBg = document.getElementById('captchaBg');
        const captchaText = document.getElementById('captchaText');
        const captchaVerified = document.getElementById('captchaVerified');

        // ==========================================
        // 1. 3D Tilt Effect
        // ==========================================
        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth < 768) return;

            const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;

            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        document.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });

        // ==========================================
        // 2. Password Visibility Toggle
        // ==========================================
        togglePasswordBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            const icon = togglePasswordBtn.querySelector('i');
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        });

        toggleConfirmPasswordBtn.addEventListener('click', () => {
            const type = confirmPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            confirmPasswordInput.setAttribute('type', type);
            const icon = toggleConfirmPasswordBtn.querySelector('i');
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        });

        // ==========================================
        // 3. Phone Number Input Restriction
        // ==========================================
        phoneInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '');
        });

        // ==========================================
        // 4. Password Strength Meter
        // ==========================================
        passwordInput.addEventListener('input', (e) => {
            const password = e.target.value;
            let strength = 0;

            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
            if (password.match(/\d/)) strength++;
            if (password.match(/[^a-zA-Z\d]/)) strength++;

            const colors = ['bg-red-500', 'bg-orange-500', 'bg-yellow-500', 'bg-lime-500', 'bg-green-600'];
            const texts = ['太短', '弱', '中等', '强', '非常强'];
            const widths = ['20%', '40%', '60%', '80%', '100%'];

            if (password.length === 0) {
                strengthMeter.style.width = '0%';
                strengthMeter.className = 'strength-meter bg-amber-200';
                strengthText.textContent = '密码强度: 未输入';
            } else {
                strengthMeter.style.width = widths[strength];
                strengthMeter.className = `strength-meter ${colors[strength]}`;
                strengthText.textContent = `密码强度: ${texts[strength]}`;
            }
        });

        // ==========================================
        // 5. Human Verification CAPTCHA
        // ==========================================
        let isDragging = false;
        let startX = 0;
        let currentX = 0;
        const containerWidth = captchaContainer.offsetWidth;
        const sliderWidth = captchaSlider.offsetWidth;
        const maxDrag = containerWidth - sliderWidth;

        function initCaptcha() {
            // Mouse events
            captchaSlider.addEventListener('mousedown', startDrag);
            document.addEventListener('mousemove', drag);
            document.addEventListener('mouseup', endDrag);

            // Touch events
            captchaSlider.addEventListener('touchstart', (e) => startDrag(e.touches[0]));
            document.addEventListener('touchmove', (e) => drag(e.touches[0]));
            document.addEventListener('touchend', endDrag);
        }

        function startDrag(e) {
            if (captchaVerified.value === 'true') return;
            isDragging = true;
            startX = e.clientX - captchaSlider.offsetLeft;
            captchaSlider.style.transition = 'none';
            captchaBg.style.transition = 'none';
        }

        function drag(e) {
            if (!isDragging) return;

            currentX = e.clientX - startX;

            if (currentX < 0) currentX = 0;
            if (currentX > maxDrag) currentX = maxDrag;

            captchaSlider.style.left = currentX + 'px';
            captchaBg.style.width = (currentX + sliderWidth) + 'px';
        }

        function endDrag() {
            if (!isDragging) return;
            isDragging = false;

            if (currentX >= maxDrag * 0.95) {
                // Success
                captchaSlider.style.left = maxDrag + 'px';
                captchaBg.style.width = containerWidth + 'px';
                captchaSlider.classList.add('success');
                captchaText.textContent = '验证通过';
                captchaText.classList.add('success');
                captchaSlider.innerHTML = '<i class="fas fa-check"></i>';
                captchaVerified.value = 'true';

                // Add success animation
                captchaContainer.style.borderColor = '#d4a373';
                captchaContainer.style.boxShadow = '0 0 20px rgba(212, 163, 115, 0.3)';
            } else {
                // Reset
                captchaSlider.style.transition = 'all 0.3s ease';
                captchaBg.style.transition = 'all 0.3s ease';
                captchaSlider.style.left = '0px';
                captchaBg.style.width = '0px';
                currentX = 0;
            }
        }

        // Reset CAPTCHA function
        function resetCaptcha() {
            captchaVerified.value = 'false';
            captchaSlider.style.left = '0px';
            captchaBg.style.width = '0px';
            captchaSlider.classList.remove('success');
            captchaText.textContent = '请按住滑块，拖动到最右边';
            captchaText.classList.remove('success');
            captchaSlider.innerHTML = '<i class="fas fa-arrow-right"></i>';
            captchaContainer.style.borderColor = 'rgba(212, 163, 115, 0.3)';
            captchaContainer.style.boxShadow = 'none';
            currentX = 0;
        }

        initCaptcha();

        // ==========================================
        // 6. 与后端服务器建立连接并发送注册请求
        // ==========================================
        async function sendRegisterRequest(userData) {
            const requestUrl = `${SERVER_CONFIG.BASE_URL}${SERVER_CONFIG.REGISTER_ENDPOINT}`;

            console.log('正在建立连接到:', requestUrl);
            console.log('请求数据:', { ...userData, password: '***', confirmPassword: '***' });

            const controller = new AbortController();
            const timeoutId = setTimeout(() => {
                controller.abort();
                console.error('请求超时');
            }, SERVER_CONFIG.TIMEOUT);

            try {
                const response = await fetch(requestUrl, {
                    method: 'POST',
                    mode: 'cors',
                    cache: 'no-cache',
                    credentials: 'same-origin',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                    },
                    redirect: 'follow',
                    referrerPolicy: 'no-referrer',
                    signal: controller.signal,
                    body: JSON.stringify(userData)
                });

                clearTimeout(timeoutId);

                console.log('服务器响应状态:', response.status);

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.message || `HTTP错误! 状态码: ${response.status}`);
                }

                const data = await response.json();
                console.log('服务器返回数据:', data);

                return {
                    success: true,
                    data: data,
                    status: response.status
                };
            } catch (error) {
                clearTimeout(timeoutId);
                console.error('连接服务器失败:', error);

                if (error.name === 'AbortError') {
                    throw new Error('连接超时，请检查服务器是否运行');
                } else if (error.message.includes('Failed to fetch')) {
                    throw new Error('无法连接到服务器 localhost:8080，请确保后端服务已启动');
                } else {
                    throw error;
                }
            }
        }

        // ==========================================
        // 7. Form Handling
        // ==========================================
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Reset errors
            [phoneInput, passwordInput, confirmPasswordInput].forEach(input => {
                input.classList.remove('border-red-500');
            });

            // const username = usernameInput.value.trim();
            const phone = phoneInput.value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            let isValid = true;
            let errorMsg = '';

            // Username validation
            // if (!username || username.length < 3) {
            //     usernameInput.classList.add('border-red-500');
            //     isValid = false;
            //     errorMsg = '用户名至少需要3个字符';
            // }

            // Phone validation
            const phoneRegex = /^1[3-9]\d{9}$/;
            if (!phoneRegex.test(phone)) {
                phoneInput.classList.add('border-red-500');
                isValid = false;
                errorMsg = errorMsg || '请输入有效的手机号码';
            }

            // Password validation
            if (!password || password.length < 6) {
                passwordInput.classList.add('border-red-500');
                isValid = false;
                errorMsg = errorMsg || '密码至少需要6个字符';
            }

            // Confirm password validation
            if (password !== confirmPassword) {
                confirmPasswordInput.classList.add('border-red-500');
                isValid = false;
                errorMsg = errorMsg || '两次输入的密码不一致';
            }

            // CAPTCHA validation
            if (captchaVerified.value !== 'true') {
                isValid = false;
                errorMsg = errorMsg || '请完成人机验证';
                captchaContainer.classList.add('shake');
                setTimeout(() => captchaContainer.classList.remove('shake'), 500);
            }

            // Agreement validation
            if (!agreementCheckbox.checked) {
                isValid = false;
                errorMsg = errorMsg || '请同意服务条款和隐私政策';
            }

            if (!isValid) {
                card.classList.add('shake');
                showToast(errorMsg, 'error');
                setTimeout(() => card.classList.remove('shake'), 500);
                return;
            }

            // Start loading
            setLoading(true);

            try {
                const result = await sendRegisterRequest({
                    phone: phone,
                    password: password,
                    captchaVerified: true,
                    timestamp: new Date().toISOString(),
                    client: 'web-browser'
                });


                if (result.success) {
                    showToast('注册成功！即将跳转...', 'success');

                    if (result.data.token) {
                        localStorage.setItem('auth_token', result.data.token);
                    }

                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 2000);
                }

            } catch (error) {
                showToast(error.message, 'error');
                // Reset CAPTCHA on error
                resetCaptcha();
            } finally {
                setLoading(false);
            }
        });

        function setLoading(isLoading) {
            if (isLoading) {
                submitBtn.disabled = true;
                btnText.classList.add('hidden');
                btnLoader.classList.remove('hidden');
                submitBtn.classList.add('cursor-not-allowed', 'opacity-80');
            } else {
                submitBtn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoader.classList.add('hidden');
                submitBtn.classList.remove('cursor-not-allowed', 'opacity-80');
            }
        }

        function showToast(msg, type) {
            toastMessage.textContent = msg;

            if (type === 'error') {
                toastIcon.className = 'fas fa-exclamation-circle text-red-400 text-xl';
                toast.style.backgroundColor = '#450a0a';
                toast.style.border = '1px solid #ef4444';
            } else {
                toastIcon.className = 'fas fa-check-circle text-green-400 text-xl';
                toast.style.backgroundColor = '#064e3b';
                toast.style.border = '1px solid #10b981';
            }

            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ==========================================
        // 8. Particle Background System
        // ==========================================
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particlesArray;

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.directionX = (Math.random() * 0.4) - 0.2;
                this.directionY = (Math.random() * 0.4) - 0.2;
                this.size = Math.random() * 2;
                this.color = 'rgba(212, 163, 115, 0.4)';
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
            update() {
                if (this.x > canvas.width || this.x < 0) {
                    this.directionX = -this.directionX;
                }
                if (this.y > canvas.height || this.y < 0) {
                    this.directionY = -this.directionY;
                }
                this.x += this.directionX;
                this.y += this.directionY;
                this.draw();
            }
        }

        function initParticles() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 15000;
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animateParticles() {
            requestAnimationFrame(animateParticles);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connectParticles();
        }

        function connectParticles() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x))
                        + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    if (distance < (canvas.width/7) * (canvas.height/7)) {
                        opacityValue = 1 - (distance/20000);
                        ctx.strokeStyle = 'rgba(212, 163, 115,' + opacityValue + ')';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(piclesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        });

        initParticles();
        animateParticles();
    });
</script>
</body>
</html>
